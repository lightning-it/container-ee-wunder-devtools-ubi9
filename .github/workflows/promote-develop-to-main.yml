# yamllint disable rule:truthy
---
name: Promote develop to main

on:
  push:
    branches: ["develop"]
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    name: Open develop-to-main promotion PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create or update promotion PR
        env:
          BOT_TOKEN: ${{ secrets.LITRELEASEBOT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr_token="${GITHUB_TOKEN:?GITHUB_TOKEN is required}"
          if [ -n "${BOT_TOKEN:-}" ]; then
            if GH_TOKEN="$BOT_TOKEN" gh api user --jq '.login' >/dev/null 2>&1; then
              pr_token="$BOT_TOKEN"
            else
              echo "LITRELEASEBOT_TOKEN is not valid; falling back to GITHUB_TOKEN."
            fi
          fi

          if ! GH_TOKEN="$pr_token" gh auth status --hostname github.com >/dev/null 2>&1; then
            echo "No valid GitHub token is available for promotion PRs."
            exit 1
          fi

          if ! git ls-remote --exit-code --heads origin develop >/dev/null 2>&1; then
            echo "develop branch does not exist; skipping promotion."
            exit 0
          fi

          git fetch origin main develop

          if git merge-base --is-ancestor origin/develop origin/main; then
            echo "main already contains develop; skipping promotion."
            exit 0
          fi

          title="chore(release): promote develop to main"
          pr_url="$(GH_TOKEN="$pr_token" gh pr list \
            --repo "$REPO" \
            --base main \
            --head develop \
            --state open \
            --json url \
            --jq '.[0].url')"

          if ! git merge-base --is-ancestor origin/main origin/develop; then
            {
              echo "main is not an ancestor of develop."
              echo "Sync main back to develop before opening a promotion PR."
            }
            if [ -n "$pr_url" ]; then
              GH_TOKEN="$pr_token" gh pr close "$pr_url" \
                --repo "$REPO" \
                --comment "Closing stale promotion PR: main is not an ancestor of develop."
            fi
            exit 0
          fi

          if git diff --quiet origin/main origin/develop -- .; then
            echo "develop and main have no file differences; promotion not needed."
            if [ -n "$pr_url" ]; then
              GH_TOKEN="$pr_token" gh pr close "$pr_url" \
                --repo "$REPO" \
                --comment "Closing empty promotion PR: develop and main have no file differences."
            fi
            exit 0
          fi

          body=$'Promotion PR from `develop` to `main`.\n\n'
          body+=$'Merging this PR is the production container release gate. '
          body+=$'After merge, semantic-release calculates the next version, '
          body+=$'creates the GitHub Release, and the container publish workflow '
          body+=$'builds from the exact release tag.\n\n'
          body+=$'Merge this PR with a merge commit so `develop` becomes an '
          body+=$'ancestor of `main`.'

          if [ -z "$pr_url" ]; then
            GH_TOKEN="$pr_token" gh pr create \
              --repo "$REPO" \
              --base main \
              --head develop \
              --title "$title" \
              --body "$body"
          else
            GH_TOKEN="$pr_token" gh pr edit "$pr_url" \
              --repo "$REPO" \
              --title "$title" \
              --body "$body"
          fi
