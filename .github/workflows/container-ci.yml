# yamllint disable rule:truthy
---
name: Container CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate container repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run container CI parity checks
        run: bash scripts/wunder-devtools-ee.sh scripts/devtools-container-ci.sh ci
