# yamllint disable rule:truthy
---
name: Container Build & Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build & push image to Quay.io
    runs-on: ubuntu-latest
    env:
      REGISTRY: quay.io

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate Quay variables/secrets
        shell: bash
        env:
          QUAY_NAMESPACE: ${{ vars.QUAY_NAMESPACE }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          set -euo pipefail

          fail=0

          if [ -z "${QUAY_NAMESPACE:-}" ]; then
            echo "::error::Missing required org/repo variable: vars.QUAY_NAMESPACE"
            fail=1
          fi

          if [ -z "${QUAY_USERNAME:-}" ]; then
            echo "::error::Missing required secret: secrets.QUAY_USERNAME"
            fail=1
          fi

          if [ -z "${QUAY_PASSWORD:-}" ]; then
            echo "::error::Missing required secret: secrets.QUAY_PASSWORD"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

          echo "Quay configuration present (namespace + credentials)."

      - name: Compute image name and tags
        shell: bash
        env:
          QUAY_NAMESPACE: ${{ vars.QUAY_NAMESPACE }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY#*/}"
          image_repo="${repo#container-}"

          image_name="${REGISTRY}/${QUAY_NAMESPACE}/${image_repo}"
          release_tag="${{ github.event.release.tag_name }}"
          version="${release_tag#v}"
          full_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "IMAGE_NAME=${image_name}"
            echo "RELEASE_TAG=${release_tag}"
            echo "VERSION=${version}"
            echo "FULL_SHA=${full_sha}"
            echo "SHORT_SHA=${short_sha}"
            echo "CREATED=${created}"
          } >> "$GITHUB_ENV"

          echo "Using IMAGE_NAME=${image_name}"
          echo "Using RELEASE_TAG=${release_tag}"
          echo "Using VERSION=${version}"
          echo "Using SHORT_SHA=${short_sha}"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.FULL_SHA }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.created=${{ env.CREATED }}
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}

      - name: Verify pushed image tags
        shell: bash
        run: |
          set -euo pipefail

          docker buildx imagetools inspect "${IMAGE_NAME}:${RELEASE_TAG}" >/dev/null
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}" >/dev/null
          docker buildx imagetools inspect "${IMAGE_NAME}:sha-${SHORT_SHA}" >/dev/null
          docker buildx imagetools inspect "${IMAGE_NAME}:latest" >/dev/null
