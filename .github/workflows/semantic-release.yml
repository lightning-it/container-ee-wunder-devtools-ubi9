# yamllint disable rule:truthy
---
name: Semantic Release

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: yamllint
        run: bash scripts/wunder-devtools-ee.sh yamllint .github

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.LITRELEASEBOT_TOKEN }}
      GH_TOKEN: ${{ secrets.LITRELEASEBOT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git user (bot)
        run: |
          git config user.name "litreleasebot"
          git config user.email "litreleasebot@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.LITRELEASEBOT_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Run semantic-release
        run: |
          npx --yes \
            --package semantic-release@25 \
            --package @semantic-release/commit-analyzer@13 \
            --package @semantic-release/github@12 \
            --package @semantic-release/release-notes-generator@14 \
            --package conventional-changelog-conventionalcommits@9 \
            semantic-release

  release_dry_run:
    name: Semantic Release (dry run)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Run semantic-release (dry run)
        run: |
          npx --yes \
            --package semantic-release@25 \
            --package @semantic-release/commit-analyzer@13 \
            --package @semantic-release/github@12 \
            --package @semantic-release/release-notes-generator@14 \
            --package conventional-changelog-conventionalcommits@9 \
            semantic-release --dry-run --no-ci --branches main
