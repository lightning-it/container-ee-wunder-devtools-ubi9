---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: container-ci-parity
        name: container CI parity (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/wunder-devtools-ee.sh scripts/devtools-container-ci.sh all
        pass_filenames: false
        always_run: true
